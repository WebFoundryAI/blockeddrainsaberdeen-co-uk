name: Create Plumber Repositories

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "CREATE" to confirm repository creation'
        required: true
        default: ''

jobs:
  create-repos:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CREATE'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          gh --version

      - name: Create all plumber repositories
        env:
          GH_TOKEN: ${{ secrets.REPO_CREATE_TOKEN }}
        run: |
          set -e

          GITHUB_ORG="WebFoundryAI"
          TEMPLATE_DIR="plumber-repos-template"

          DOMAINS=(
            "bristolemergencyplumber.co.uk"
            "nottinghamplumberservices.co.uk"
            "stockportplumbercheshire.co.uk"
            "stokeplumbersandboilers.co.uk"
            "bath-plumbers.co.uk"
            "chesterplumbernearme.co.uk"
            "greatyarmouthplumbers.co.uk"
            "plumberspoole.co.uk"
          )

          echo "======================================"
          echo "Creating 8 Plumber Website Repositories"
          echo "======================================"

          for domain in "${DOMAINS[@]}"; do
            echo ""
            echo "----------------------------------------"
            echo "Processing: $domain"
            echo "----------------------------------------"

            # Check if repo already exists
            if gh repo view "$GITHUB_ORG/$domain" &> /dev/null; then
              echo "Repository $domain already exists, skipping..."
              continue
            fi

            # Create the repository
            echo "Creating repository..."
            gh repo create "$GITHUB_ORG/$domain" \
              --public \
              --description "Professional plumber website for $domain" \
              --homepage "https://$domain"

            echo "Repository created successfully"

            # Clone, add template, push
            echo "Adding template files..."
            TEMP_DIR=$(mktemp -d)
            git clone "https://x-access-token:${GH_TOKEN}@github.com/$GITHUB_ORG/$domain.git" "$TEMP_DIR/$domain"

            # Copy template files (exclude scripts and deployment docs)
            cp -r "$TEMPLATE_DIR"/* "$TEMP_DIR/$domain/"
            rm -f "$TEMP_DIR/$domain/create-repos.sh"
            rm -f "$TEMP_DIR/$domain/DEPLOYMENT.md"

            # Update README with domain name
            sed -i "s/\[domain-name\]/$domain/g" "$TEMP_DIR/$domain/README.md"

            # Update sitemap and robots with domain
            sed -i "s/example.com/$domain/g" "$TEMP_DIR/$domain/sitemap.xml"
            sed -i "s/example.com/$domain/g" "$TEMP_DIR/$domain/robots.txt"

            # Commit and push
            cd "$TEMP_DIR/$domain"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Initial commit: plumber website template for $domain"
            git push origin main

            cd -
            rm -rf "$TEMP_DIR"

            echo "Completed: $domain"
          done

          echo ""
          echo "======================================"
          echo "All repositories created successfully!"
          echo "======================================"
          echo ""
          echo "Repositories:"
          for domain in "${DOMAINS[@]}"; do
            echo "  - https://github.com/$GITHUB_ORG/$domain"
          done

      - name: Summary
        run: |
          echo "## Repositories Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | Repository |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| bristolemergencyplumber.co.uk | [View](https://github.com/WebFoundryAI/bristolemergencyplumber.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| nottinghamplumberservices.co.uk | [View](https://github.com/WebFoundryAI/nottinghamplumberservices.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| stockportplumbercheshire.co.uk | [View](https://github.com/WebFoundryAI/stockportplumbercheshire.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| stokeplumbersandboilers.co.uk | [View](https://github.com/WebFoundryAI/stokeplumbersandboilers.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| bath-plumbers.co.uk | [View](https://github.com/WebFoundryAI/bath-plumbers.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| chesterplumbernearme.co.uk | [View](https://github.com/WebFoundryAI/chesterplumbernearme.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| greatyarmouthplumbers.co.uk | [View](https://github.com/WebFoundryAI/greatyarmouthplumbers.co.uk) |" >> $GITHUB_STEP_SUMMARY
          echo "| plumberspoole.co.uk | [View](https://github.com/WebFoundryAI/plumberspoole.co.uk) |" >> $GITHUB_STEP_SUMMARY
